services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drugs}
      POSTGRES_USER: ${POSTGRES_USER:-dti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dti} -d ${POSTGRES_DB:-drugs}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    command: ["python", "-m", "uvicorn", "apps.api_service.src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ML_QUEUE_KEY: ${ML_QUEUE_KEY:-queue:ml:queued}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ML_QUEUE_KEY: ${ML_QUEUE_KEY:-queue:ml:queued}
      ML_ASSETS_ROOT: ${ML_ASSETS_ROOT:-/app}
      ML_WORKER_POLL_INTERVAL: ${ML_WORKER_POLL_INTERVAL:-1}
      ML_MAX_RETRIES: ${ML_MAX_RETRIES:-3}
      ML_GNN_FEATURES: ${ML_GNN_FEATURES:-40}
      ML_GNN_DEPTH: ${ML_GNN_DEPTH:-3}
      ML_MLP_DEPTH: ${ML_MLP_DEPTH:-2}
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data_dev:
